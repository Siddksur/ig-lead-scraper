name: Recover Leads from Existing Apify Run

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Apify run ID to recover (find it in today''s failed run logs)'
        required: true
        type: string

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Recover leads from Apify run
        env:
          APIFY_TOKEN:                 ${{ secrets.APIFY_TOKEN }}
          APIFY_RUN_ID:                ${{ inputs.run_id }}
          GHL_API_KEY:                 ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID:             ${{ secrets.GHL_LOCATION_ID }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PYTHONUNBUFFERED: "1"
        run: python -u daily_scrape.py
